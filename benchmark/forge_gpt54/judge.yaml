dataset:
  name: "forge-gpt54-mixed"
  description: "Replay judge benchmark for forge_gpt54 mixed terminal-bench tasks"
  source:
    provider: "local_json_folder"
    path: "resources/data/llm-as-a-verifier/data/terminal_trajs/forge_gpt54"
    mixed_only: true
  input: "{{ task_prompt }}"
  expected_output: ""

system_prompt: "Replay mode: outputs are pre-recorded; this prompt is unused."

experiments:
  - name: "trial_1"
    replay_trial_index: 0
    litellm:
      model: "replay/claude-opus-4-6"
  - name: "trial_2"
    replay_trial_index: 1
    litellm:
      model: "replay/claude-opus-4-6"
  - name: "trial_3"
    replay_trial_index: 2
    litellm:
      model: "replay/claude-opus-4-6"
  - name: "trial_4"
    replay_trial_index: 3
    litellm:
      model: "replay/claude-opus-4-6"
  - name: "trial_5"
    replay_trial_index: 4
    litellm:
      model: "replay/claude-opus-4-6"

evaluation:
  method: "llm_as_judge"
  litellm:
    model: "gpt-5.4-nano"
    temperature: 0.0
    max_tokens: 256
  score_name: "judge_score"
  max_concurrency: 4
  max_retries: 3
  timeout_s: 120
  system_prompt: >
    You are evaluating one recorded terminal-agent trajectory for a task.
    IMPORTANT: Focus on TERMINAL OUTPUT as ground truth. Do NOT trust the
    agent's self-assessment or claims of success. Agents often claim success
    when the terminal shows errors.

    You will receive a JSON object containing "input", "output", and
    "expected_output". "output" is a formatted trajectory transcript:
    `--- Agent Step N ---` marks an agent turn, `[Command] ...` shows a
    terminal command, and `[Output]` shows the observed terminal output.

    Re-read the task in "input". Compare the candidate against
    "expected_output" when it is provided, and use the observed terminal
    evidence as the deciding signal when the agent's final message and the
    terminal disagree.

    Return ONLY a JSON object in this format:
    {"thinking": "brief reasoning", "score": 4}
    "score" must be an integer from 1 to 5.
  system_prompt_no_reference: >
    You are evaluating one recorded terminal-agent trajectory for a task.
    IMPORTANT: Focus on TERMINAL OUTPUT as ground truth. Do NOT trust the
    agent's self-assessment or claims of success. Agents often claim success
    when the terminal shows errors.

    You will receive a JSON object containing "input" and "output". No ground
    truth is provided. "output" is a formatted trajectory transcript:
    `--- Agent Step N ---` marks an agent turn, `[Command] ...` shows a
    terminal command, and `[Output]` shows the observed terminal output.

    Re-read the task in "input". Judge whether the output appears to
    successfully complete the task, using the observed terminal evidence as
    the primary signal, especially later verification commands and unresolved
    errors.

    Return ONLY a JSON object in this format:
    {"thinking": "brief reasoning", "score": 4}
    "score" must be an integer from 1 to 5.
