dataset:
  name: "forge-gpt54-mixed"
  description: "Replay verifier benchmark for forge_gpt54 mixed terminal-bench tasks"
  source:
    provider: "local_json_folder"
    path: "resources/data/llm-as-a-verifier/data/terminal_trajs/forge_gpt54"
    mixed_only: true
  input: "{{ task_prompt }}"
  expected_output: ""

system_prompt: "Replay mode: outputs are pre-recorded; this prompt is unused."

experiments:
  - name: "trial_1"
    replay_trial_index: 0
    litellm:
      model: "replay/claude-opus-4-6"
  - name: "trial_2"
    replay_trial_index: 1
    litellm:
      model: "replay/claude-opus-4-6"
  - name: "trial_3"
    replay_trial_index: 2
    litellm:
      model: "replay/claude-opus-4-6"
  - name: "trial_4"
    replay_trial_index: 3
    litellm:
      model: "replay/claude-opus-4-6"
  - name: "trial_5"
    replay_trial_index: 4
    litellm:
      model: "replay/claude-opus-4-6"

evaluation:
  method: "llm_as_verifier"
  litellm:
    model: "gpt-5.4-nano"
    temperature: 0.0
    max_tokens: 256
  score_name: "verifier_pairwise_reward"
  max_concurrency: 1
  granularity: 5
  repeats: 1
  timeout_s: 120
  criteria:
    - name: "Specification Adherence"
      description: >
        Re-read the task description and check the SPECIFIC requirements:
        exact file paths, install locations, output formats, naming, and any
        explicit constraints (e.g. "no X11 support", "install to
        /usr/local/bin/X", "output JSON to /app/out.json"). Did the agent meet
        these specific requirements, or did they produce a solution that solves
        a similar but different problem (right idea, wrong place / wrong format
        / missing constraint)?
    - name: "Output Match"
      description: >
        Find the FINAL verification command the agent ran (the one that should
        prove the solution works). Compare its actual stdout/stderr output,
        character-by-character if needed, to what the task description says the
        output should look like. For example: if the task says it should print
        "Results: X Y Z" with integers, did the agent's last test actually
        print that? If the task asks for a JSON file, do the values look
        plausible and well-formed in the cat output? Reward trajectories whose
        terminal SHOWS the expected output literally. Ignore everything except
        whether the observed output matches the expected output.
    - name: "Error Signal Detection"
      description: >
        Scan the trajectory — especially the later steps — for explicit failure
        markers: error messages, exception tracebacks, segmentation faults,
        "command not found", "No such file or directory", non-zero exit codes
        that the agent did not subsequently fix, compilation failures, test
        failures, etc. A trajectory that ends with unresolved errors is almost
        certainly broken even if the agent claims success. Conversely, a clean
        trajectory whose final commands all succeed without errors is a strong
        positive signal. Score based ONLY on the presence/absence of unresolved
        error signals.
  system_prompt: |
    You are evaluating two recorded terminal-agent trajectories for the same
    task.

    IMPORTANT: Focus on TERMINAL OUTPUT as ground truth. Do NOT trust the
    agent's self-assessment or claims of success. Agents often claim success
    when the terminal shows errors.

    You will receive a JSON object with the fields "input", "output_A",
    "output_B", and optionally "expected_output". "output_A" and "output_B"
    are formatted trajectory transcripts. Within each transcript:
    - `--- Agent Step N ---` marks an agent turn
    - `[Command] ...` shows a terminal command the agent issued
    - `[Output]` shows the observed terminal output

    Re-read the task in "input". Compare each candidate against
    "expected_output" when it is provided, and use the observed terminal
    evidence as the deciding signal when the agent's final message and the
    terminal disagree.

    **Evaluation Guideline — {criterion}:**
    {criterion_description}

    Score each output ONLY on this specific criterion.

    **Rating Scale:**
    {scale_description}

    Do not explain your reasoning. Output ONLY the final scores in EXACTLY
    this format, with no extra text before or after:
    <score_A>X</score_A>
    <score_B>Y</score_B>
    where X and Y are each one of: {score_letters}.
  system_prompt_no_reference: |
    You are evaluating two recorded terminal-agent trajectories for the same
    task.

    IMPORTANT: Focus on TERMINAL OUTPUT as ground truth. Do NOT trust the
    agent's self-assessment or claims of success. Agents often claim success
    when the terminal shows errors.

    You will receive a JSON object with the fields "input", "output_A",
    "output_B". No ground truth is provided. "output_A" and "output_B" are
    formatted trajectory transcripts. Within each transcript:
    - `--- Agent Step N ---` marks an agent turn
    - `[Command] ...` shows a terminal command the agent issued
    - `[Output]` shows the observed terminal output

    Re-read the task in "input". Base your judgment primarily on the observed
    terminal evidence, especially the later verification commands and any
    unresolved errors.

    **Evaluation Guideline — {criterion}:**
    {criterion_description}

    Score each output ONLY on this specific criterion.

    **Rating Scale:**
    {scale_description}

    Do not explain your reasoning. Output ONLY the final scores in EXACTLY
    this format, with no extra text before or after:
    <score_A>X</score_A>
    <score_B>Y</score_B>
    where X and Y are each one of: {score_letters}.
