evaluation:
  llm_as_judge: >
    You're an expert judge.
    Given a JSON object with the fields "input", "output" and "expected_output",
    rate how similar "output" is to "expected_output".
    Return ONLY a JSON object with the following format:

    {"thinking": "The output correctly identifies the main concept but misses two key details from the expected output.", "score": 4}

    "thinking" must come first: a short step-by-step reasoning explaining your assessment.
    "score" must be an integer from 1 to 5 (1 = completely wrong, 5 = perfect match).
  llm_as_judge_no_reference: >
    You're an expert judge. No ground truth is provided.
    Given a JSON object with the fields "input" and "output",
    judge the output's overall quality (correctness, relevance, clarity) as a response to the input.
    Return ONLY a JSON object with the following format:

    {"thinking": "The output is relevant but lacks depth and contains a minor inaccuracy.", "score": 3}

    "thinking" must come first: a short step-by-step reasoning explaining your assessment.
    "score" must be an integer from 1 to 5 (1 = poor, 5 = excellent).
  pairwise_judge: >
    You're an expert judge comparing two model outputs head-to-head for the same input.
    Input JSON has "input", "output_A", "output_B", "expected_output".
    Decide which output is closer to the expected output.
    Return ONLY a JSON object with the following format:

    {"thinking": "Output A is more accurate and closely follows the expected output, while B omits a key detail.", "winner": "A"}

    "thinking" must come first: a short step-by-step reasoning explaining your assessment.
    "winner" must be exactly "A", "B", or "tie".
    Use "tie" only when the two outputs are of clearly equivalent quality.
  pairwise_judge_no_reference: >
    You're an expert judge comparing two model outputs head-to-head for the same input.
    No ground truth is provided.
    Input JSON has "input", "output_A", "output_B".
    Decide which output is the higher-quality response (correctness, relevance, clarity).
    Return ONLY a JSON object with the following format:

    {"thinking": "Output B is more comprehensive and better structured, covering all aspects of the question.", "winner": "B"}

    "thinking" must come first: a short step-by-step reasoning explaining your assessment.
    "winner" must be exactly "A", "B", or "tie".
    Use "tie" only when the two outputs are of clearly equivalent quality.
  llm_as_verifier: >
    You are a strict verifier. Given a JSON object with fields "input", "output",
    and "expected_output", judge how correct "output" is relative to "expected_output"
    on a {granularity}-level scale using one of these letters: {score_letters}
    ({best_letter} = perfectly correct, {worst_letter} = completely wrong).
    You may reason briefly first, then end your reply with EXACTLY:
    <score>X</score>
    where X is one of: {score_letters}.
  llm_as_verifier_no_reference: >
    You are a strict verifier. No ground truth is provided. Given a JSON object with
    fields "input" and "output", judge the overall quality of "output" (correctness,
    relevance, clarity) on a {granularity}-level scale using one of these letters:
    {score_letters} ({best_letter} = excellent, {worst_letter} = poor).
    You may reason briefly first, then end your reply with EXACTLY:
    <score>X</score>
    where X is one of: {score_letters}.
