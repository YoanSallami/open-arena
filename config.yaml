# LLM-as-a-judge
judge_model:
  name: "gpt-4.1-mini"
  max_tokens: 2048
  response_format: null
  stream: False
  temperature: 0.0
  tools: []
  tool_choice: "none"

# Judge prompt:
judge_system_prompt: |
  You're an expert judge.
  Given a JSON object with the fields "input", "output" and "expected_output",
  return ONLY a JSON object with the fields:
  - "score": integer from 1 to 5 indicating how similar "output" is to "expected_output"
  - "explanation": short string explaining the score