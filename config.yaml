datasets:
  mmlu_test:
    type: huggingface
    path: cais/mmlu
    name: all
    split: test
    streaming: true
    limit: 50
    batch_size: 1
    input_template: |
      {
        "messages": [
          {
            "role": "user",
            "content": {{ ("Question: " ~ question ~ "\nA) " ~ choices[0] ~ "\nB) " ~ choices[1] ~ "\nC) " ~ choices[2] ~ "\nD) " ~ choices[3] ~ "\n\nAnswer with a single letter A, B, C, or D.") | tojson }}
          }
        ]
      }
    output_template: |
      {
        "role": "assistant",
        "content": {{ ["A", "B", "C", "D"][answer] | tojson }}
      }
    generator:
      temperature: 0.0
      instructions: |
        You are answering a multiple-choice question. Reply with exactly one letter: A, B, C,
        or D. Do not include any explanation, punctuation, or extra text.
    reward:
      name: exact_match
      in_mask: [content]

  gsm8k_test:
    type: huggingface
    path: gsm8k
    name: main
    split: test
    streaming: true
    limit: 50
    batch_size: 1
    input_template: |
      {
        "messages": [
          {"role": "user", "content": {{ question | tojson }}}
        ]
      }
    output_template: |
      {
        "role": "assistant",
        "content": {{ answer.split("####")[-1].strip() | tojson }}
      }
    generator:
      temperature: 0.0
      instructions: |
        Solve the math word problem. Reply with only the final numerical answer —
        no units, no explanation, no extra text.
    reward:
      name: exact_match
      in_mask: [content]

  # HellaSwag — commonsense continuation, 4-way MCQ.
  hellaswag_validation:
    type: huggingface
    path: Rowan/hellaswag
    split: validation
    streaming: true
    limit: 50
    batch_size: 1
    input_template: |
      {
        "messages": [
          {
            "role": "user",
            "content": {{ (ctx ~ "\nA) " ~ endings[0] ~ "\nB) " ~ endings[1] ~ "\nC) " ~ endings[2] ~ "\nD) " ~ endings[3]) | tojson }}
          }
        ]
      }
    output_template: |
      {"role": "assistant", "content": {{ ["A", "B", "C", "D"][label | int] | tojson }}}
    generator:
      temperature: 0.0
      instructions: |
        Pick the most plausible continuation. Reply with exactly one letter:
        A, B, C, or D. No explanation, no extra text.
    reward:
      name: exact_match
      in_mask: [content]

  # ARC-Challenge — grade-school science MCQ.
  arc_challenge_test:
    type: huggingface
    path: allenai/ai2_arc
    name: ARC-Challenge
    split: test
    streaming: true
    limit: 50
    batch_size: 1
    input_template: |
      {%- set lines = [] -%}
      {%- for i in range(choices.text | length) -%}
        {%- set _ = lines.append(choices.label[i] ~ ") " ~ choices.text[i]) -%}
      {%- endfor -%}
      {
        "messages": [
          {"role": "user", "content": {{ (question ~ "\n" ~ lines | join("\n")) | tojson }}}
        ]
      }
    output_template: |
      {"role": "assistant", "content": {{ answerKey | tojson }}}
    generator:
      temperature: 0.0
      instructions: |
        Answer the science question. Reply with only the letter (or number) of the
        correct choice — no explanation, no extra text.
    reward:
      name: exact_match
      in_mask: [content]

  # WinoGrande — pronoun resolution, binary choice.
  winogrande_validation:
    type: huggingface
    path: allenai/winogrande
    name: winogrande_xl
    split: validation
    streaming: true
    limit: 50
    batch_size: 1
    input_template: |
      {
        "messages": [
          {"role": "user", "content": {{ (sentence ~ "\n1) " ~ option1 ~ "\n2) " ~ option2) | tojson }}}
        ]
      }
    output_template: |
      {"role": "assistant", "content": {{ answer | tojson }}}
    generator:
      temperature: 0.0
      instructions: |
        Choose which option fills the blank (marked `_`) in the sentence. Reply
        with only "1" or "2" — no explanation, no extra text.
    reward:
      name: exact_match
      in_mask: [content]

  # BoolQ — yes/no reading comprehension.
  boolq_validation:
    type: huggingface
    path: google/boolq
    split: validation
    streaming: true
    limit: 50
    batch_size: 1
    input_template: |
      {
        "messages": [
          {"role": "user", "content": {{ (passage ~ "\n\nQuestion: " ~ question ~ "?") | tojson }}}
        ]
      }
    output_template: |
      {"role": "assistant", "content": {{ ("yes" if answer else "no") | tojson }}}
    generator:
      temperature: 0.0
      instructions: |
        Read the passage and answer the question. Reply with exactly one word:
        "yes" or "no" — no explanation, no extra text.
    reward:
      name: exact_match
      in_mask: [content]

  # BIG-Bench Hard (boolean_expressions task — swap `name:` for any of the 23 tasks).
  bbh_boolean_expressions:
    type: huggingface
    path: lukaemon/bbh
    name: boolean_expressions
    split: test
    streaming: true
    limit: 50
    batch_size: 1
    input_template: |
      {"messages":[{"role":"user","content": {{ input | tojson }}}]}
    output_template: |
      {"role":"assistant","content": {{ target | tojson }}}
    generator:
      temperature: 0.0
      instructions: |
        Evaluate the boolean expression. Reply with exactly one word — `True` or
        `False`, with that capitalization — and nothing else.
    reward:
      name: exact_match
      in_mask: [content]

  # DROP — discrete reasoning over paragraphs.
  drop_validation:
    type: huggingface
    path: ucinlp/drop
    split: validation
    streaming: true
    limit: 50
    batch_size: 1
    input_template: |
      {"messages":[{"role":"user","content": {{ (passage ~ "\n\nQuestion: " ~ question) | tojson }}}]}
    output_template: |
      {"role":"assistant","content": {{ answers_spans.spans[0] | tojson }}}
    generator:
      temperature: 0.0
      instructions: |
        Answer the question using a short span from the passage (a number, date, or short
        phrase). Reply with only the answer — no explanation, no extra text.
    reward:
      name: exact_match
      in_mask: [content]

  # TruthfulQA (MC1) — pick the single truthful answer; choice count varies.
  truthfulqa_mc1:
    type: huggingface
    path: truthful_qa
    name: multiple_choice
    split: validation
    streaming: true
    limit: 50
    batch_size: 1
    input_template: |
      {%- set letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ" -%}
      {%- set lines = [] -%}
      {%- for i in range(mc1_targets.choices | length) -%}
        {%- set _ = lines.append(letters[i] ~ ") " ~ mc1_targets.choices[i]) -%}
      {%- endfor -%}
      {"messages":[{"role":"user","content": {{ (question ~ "\n" ~ lines | join("\n")) | tojson }}}]}
    output_template: |
      {%- set letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ" -%}
      {"role":"assistant","content": {{ letters[mc1_targets.labels.index(1)] | tojson }}}
    generator:
      temperature: 0.0
      instructions: |
        Pick the single truthful answer. Reply with exactly one letter — no explanation.
    reward:
      name: exact_match
      in_mask: [content]

  # HumanEval — code generation. Real scoring runs unit tests; exact_match is a placeholder.
  humaneval:
    type: huggingface
    path: openai/openai_humaneval
    split: test
    streaming: true
    limit: 50
    batch_size: 1
    input_template: |
      {"messages":[{"role":"user","content": {{ prompt | tojson }}}]}
    output_template: |
      {"role":"assistant","content": {{ canonical_solution | tojson }}}
    generator:
      temperature: 0.0
      instructions: |
        Complete the Python function. Output only the indented function body
        (the code that goes inside the function). Do not repeat the signature or
        docstring, do not wrap the output in markdown code fences, do not add
        any explanation.
    reward:
      name: exact_match
      in_mask: [content]

  # IFEval — instruction following; rule-based in the original benchmark.
  ifeval:
    type: huggingface
    path: google/IFEval
    split: train
    streaming: true
    limit: 50
    batch_size: 1
    input_template: |
      {"messages":[{"role":"user","content": {{ prompt | tojson }}}]}
    output_template: |
      {"role":"assistant","content": {{ prompt | tojson }}}
    generator:
      temperature: 0.0
      instructions: |
        Follow the instruction exactly as stated.
    reward:
      name: lm_as_judge
      language_model: ollama/llama3.2
      # No `in_mask` here — judge rewards see the full row (input
      # `messages` + assistant `content` + `thinking`) so they can
      # reason about the original instruction. `return_inputs=True` in
      # the CoT wraps the input prompt onto the prediction.
      instructions: |
        Score 0.0–1.0 on how strictly the response satisfies every constraint
        in the original instruction. The "expected" field contains the original
        instruction for reference.

  # SQuAD v1.1 — extractive reading comprehension.
  squad_validation:
    type: huggingface
    path: rajpurkar/squad
    split: validation
    streaming: true
    limit: 50
    batch_size: 1
    input_template: |
      {"messages":[{"role":"user","content": {{ (context ~ "\n\nQuestion: " ~ question) | tojson }}}]}
    output_template: |
      {"role":"assistant","content": {{ answers.text[0] | tojson }}}
    generator:
      temperature: 0.0
      instructions: |
        Answer using a short span from the context. Reply with only the answer span.
    reward:
      name: exact_match
      in_mask: [content]

  # LogiQA — logical reasoning, 4-way MCQ. Using fireworks-ai's Parquet
  # mirror; `options` strings already include "A." / "B." / ... prefixes.
  logiqa_test:
    type: huggingface
    path: fireworks-ai/logiqa
    split: test
    streaming: true
    limit: 50
    batch_size: 1
    input_template: |
      {
        "messages": [
          {
            "role": "user",
            "content": {{ (context ~ "\n\nQuestion: " ~ question ~ "\n" ~ options | join("\n")) | tojson }}
          }
        ]
      }
    output_template: |
      {"role":"assistant","content": {{ answer | tojson }}}
    generator:
      temperature: 0.0
      instructions: |
        Read the context and answer with exactly one letter: A, B, C, or D.
    reward:
      name: exact_match
      in_mask: [content]

  # BBQ — Bias Benchmark for QA (Age subset; swap `split:` for other
  # categories: gender_identity, race_ethnicity, religion, ses, ...).
  # walledai/BBQ is a Parquet mirror: single `default` config, one split
  # per category named in lowercase.
  bbq_age:
    type: huggingface
    path: walledai/BBQ
    split: age
    streaming: true
    limit: 50
    batch_size: 1
    input_template: |
      {
        "messages": [
          {
            "role": "user",
            "content": {{ (context ~ "\n" ~ question ~ "\nA) " ~ choices[0] ~ "\nB) " ~ choices[1] ~ "\nC) " ~ choices[2]) | tojson }}
          }
        ]
      }
    output_template: |
      {"role":"assistant","content": {{ ["A", "B", "C"][answer] | tojson }}}
    generator:
      temperature: 0.0
      instructions: |
        Answer with exactly one letter: A, B, or C. No explanation.
    reward:
      name: exact_match
      in_mask: [content]

  # LAMBADA — predict the last word of a passage.
  lambada_test:
    type: huggingface
    path: EleutherAI/lambada_openai
    name: en
    split: test
    streaming: true
    limit: 50
    batch_size: 1
    input_template: |
      {%- set words = text.split() -%}
      {"messages":[{"role":"user","content": {{ ((words[:-1] | join(" ")) ~ " ___") | tojson }}}]}
    output_template: |
      {"role":"assistant","content": {{ text.split()[-1] | tojson }}}
    generator:
      temperature: 0.0
      instructions: |
        Predict the missing final word that fills the blank (marked `___`).
        Reply with exactly one word — no punctuation, no explanation.
    reward:
      name: exact_match
      in_mask: [content]

default: mmlu_test

experiments:
  language_models:
    - ollama/mistral
    - ollama/llama3.2
  rewards:
    # Baseline: plain LM-as-judge with default-style instructions.
    - name: lm_as_judge
      alias: lm_judge
      language_model: ollama/llama3.2
      # No `in_mask` — judges see the full row (prompt + prediction).
      instructions: |
        Score 0.0–1.0 on factual correctness of the prediction relative to
        the gold answer. 1.0 means the prediction matches the gold answer
        (modulo formatting); 0.0 means it is wrong. Partial credit is fine
        when the prediction is close but not exact.
  #   # Recursive LM-as-judge — same scoring task, but the judge is an RLM
  #   # agent that inspects the (gold, prediction) pair with code and
  #   # recursively delegates semantic comparisons to a sub-LM. Heavy: up to
  #   # `max_iterations` primary calls + `max_llm_calls` sub-LM calls per
  #   # example, on top of the trial's own model run.
  #   #
  #   # `language_model` here must be a capable model — it drives per-turn
  #   # code generation and the structured `submit`, which small models
  #   # (7B-class Ollama, llama3.2, etc.) cannot do reliably. Use a
  #   # frontier-class model for the primary; `sub_language_model` is the
  #   # cheap one used for `llm_query` / `llm_query_batched` and can be
  #   # small.
  #   - name: recursive_lm_as_judge
  #     alias: rlm_judge
  #     language_model: openai/gpt-4o
  #     sub_language_model: openai/gpt-4o-mini
  #     # No `in_mask` — RLM judge inspects the full prompt + prediction.
  #     max_iterations: 8
  #     max_llm_calls: 10
  #     instructions: |
  #       Score 0.0–1.0 on factual correctness of the prediction relative to
  #       the gold answer. Use code to extract and normalize both sides, fall
  #       back to `llm_query` only when literal comparison isn't enough.
  #   # Judge panel — N small LMs score in parallel; if their reward spread
  #   # is within `agreement_threshold` the panelist closest to the mean
  #   # wins, otherwise the smart LM is invoked and its verdict overrides
  #   # the panel. Cost: M small-LM calls always, +1 smart-LM call only on
  #   # disagreement.
  #   - name: judge_panel
  #     alias: panel_judge
  #     panel_language_models:
  #       - ollama/mistral
  #       - ollama/qwen
  #       - ollama/llama3.2
  #     smart_language_model: ollama/llama3.2
  #     agreement_threshold: 0.2
  #     # No `in_mask` — panelists see the full prompt + prediction.
  #     instructions: |
  #       Score 0.0–1.0 on factual correctness of the prediction relative to
  #       the gold answer. 1.0 means the prediction matches the gold answer
  #       (modulo formatting); 0.0 means it is wrong. Partial credit is fine
  #       when the prediction is close but not exact.
  datasets:
    - mmlu_test
    - gsm8k_test
    # - hellaswag_validation
    # - arc_challenge_test
    # - winogrande_validation
    # - boolq_validation
    # - bbh_boolean_expressions
    # - drop_validation
    # - truthfulqa_mc1
    # - humaneval
    # - ifeval
    # - squad_validation
    # - logiqa_test
    # - bbq_age
    # - lambada_test

