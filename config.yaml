dataset:
  name: "MMLU (first 5)"
  source:
    provider: "huggingface"
    repo: "cais/mmlu"
    config: "all"
    split: "test"
  input: |
    Question: {{ question }}
    A) {{ choices[0] }}
    B) {{ choices[1] }}
    C) {{ choices[2] }}
    D) {{ choices[3] }}
    Answer with the letter only.
  expected_output: "{{ ['A', 'B', 'C', 'D'][answer] }}"
  limit: 5

system_prompt: |
  You are answering multiple-choice questions. Reply with only a single letter: A, B, C, or D.

experiments:
  - name: "llama3.2"
    litellm:
      model: "ollama_chat/llama3.2:latest"
      api_base: "http://localhost:11434"
      max_tokens: 256
      temperature: 0.3
  - name: "qwen3-8b"
    litellm:
      model: "ollama_chat/qwen3:8b"
      api_base: "http://localhost:11434"
      max_tokens: 256
      temperature: 0.3

evaluation:
  method: "llm_as_verifier"
  litellm:
    model: "ollama_chat/qwen3:8b"
    api_base: "http://localhost:11434"
    max_tokens: 2048
    temperature: 0.0
  score_name: "verifier_score"
  max_concurrency: 5
  granularity: 8
  repeats: 1
