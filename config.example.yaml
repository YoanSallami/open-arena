# =========================================================================
# Open Arena — example configuration
# =========================================================================
# One YAML document describes a single run:
#   1. fetch a dataset from a provider adapter,
#   2. shape each row into (input, expected_output, metadata) via two Jinja2
#      templates,
#   3. run every experiment (one LLM config + optional MCP tools) over the
#      dataset,
#   4. evaluate the results using the configured evaluator.
#
# Everything is validated at load via Pydantic. Unknown fields inside the
# `dataset.source` block are forwarded to the chosen provider adapter;
# unknown fields inside any `litellm:` block are forwarded to LiteLLM via
# `model_kwargs` (so things like `reasoning_effort`, `seed`,
# `parallel_tool_calls`, `thinking`, ... just work).
#
# CLI flags:
#   --skip-upload        reuse an existing Langfuse dataset (don't re-upload rows)
#   --fail-fast          re-raise on the first row/eval failure instead of
#                        recording the error and continuing
#   --debug / -v         enable DEBUG-level logging
# =========================================================================


# -------------------------------------------------------------------------
# dataset  (required, single object — only one dataset per run for now)
# -------------------------------------------------------------------------
dataset:
  # Logical name. Used as the Langfuse dataset name; a dataset with this
  # name is created on first upload and reused on subsequent runs.
  name: "MMLU Anatomy"

  # Optional human-readable description attached to the Langfuse dataset.
  description: "MMLU anatomy subset — multiple choice medical QA"

  # --- source: which provider adapter fetches raw rows. --------------------
  # Dispatch is keyed on `provider`; remaining fields are adapter-specific.
  # See src/datasets/dataset_adapters/ for all options.
  source:
    # "local"        — read a file on disk (csv / excel)
    # "huggingface"  — load_dataset(repo, config, split[, revision, streaming])
    # "langfuse"     — fetch items from an existing Langfuse dataset (skips upload)
    # "langsmith"    — fetch items from an existing LangSmith dataset
    # "phoenix"      — fetch items from an existing Arize Phoenix dataset
    # "opik"         — fetch items from an existing Opik (Comet) dataset
    # "braintrust"   — fetch records from an existing Braintrust dataset
    # "weave"        — fetch rows from an existing W&B Weave dataset
    # "mlflow"       — fetch records from an MLflow GenAI evaluation dataset
    provider: "huggingface"

    # huggingface adapter fields:
    repo: "cais/mmlu"                 # HF repo id
    config: "anatomy"                 # subset/config name (omit if the repo has none)
    split: "test"                     # default: "test"
    # revision: "main"                # optional; pin to avoid silent upstream changes
    # streaming: true                 # default true; set false to materialize in memory

  # --- input: Jinja2 template rendered per row. ----------------------------
  # Any column referenced here is "consumed" as part of the model input.
  # The rendered string is passed to the model as the user turn.
  input: |
    Question: {{ question }}
    A) {{ choices[0] }}
    B) {{ choices[1] }}
    C) {{ choices[2] }}
    D) {{ choices[3] }}
    Answer with the letter only.

  # --- expected_output: Jinja2 template rendered per row. ------------------
  # Produces the ground-truth string used by reference-based evaluators
  # (`llm_as_judge`, `llm_as_verifier`). Set this to the empty string ("")
  # to signal "no ground truth" — no-reference prompts will be used
  # automatically.
  expected_output: "{{ ['A', 'B', 'C', 'D'][answer] }}"

  # Optional cap on the number of rows processed (useful for smoke tests).
  limit: 100

# Any dataset column not referenced by either template automatically flows
# through as metadata on the Langfuse trace (not shown to the model/judge).

# --- Alternative: local CSV / Excel --------------------------------------
# dataset:
#   name: "QA Sample"
#   source:
#     provider: "local"
#     path: "resources/data/QA_sample.csv"
#     format: "csv"                   # "csv" | "excel"
#   # Local file column headers are exposed using their original names.
#   # For headers with spaces/case, use bracket access (for example:
#   # row["Question"], row["Option A"], row["Answer"]). If you prefer
#   # {{ question }}-style access, use snake_case column headers in the file.
#   input: |
#     {{ row["Question"] }}
#     A) {{ row["Option A"] }}
#     B) {{ row["Option B"] }}
#     C) {{ row["Option C"] }}
#     D) {{ row["Option D"] }}
#   expected_output: "{{ row["Answer"] }}"

# --- Alternative: existing Langfuse dataset ------------------------------
# Items come from Langfuse already, so no upload happens. Item fields are
# exposed to the templates as top-level variables:
#   - {{ input }}            — whatever was stored (str, dict, list, ...)
#   - {{ expected_output }}  — same
#   - metadata keys are spread at the top level (e.g. {{ category }})
# dataset:
#   name: "My Eval Run"
#   source:
#     provider: "langfuse"
#     dataset_name: "mmlu-anatomy"    # optional; defaults to `name` above
#   input: "{{ input.question }}"     # if input was stored as a dict
#   expected_output: "{{ expected_output }}"

# --- Alternative: existing LangSmith dataset -----------------------------
# Items are fetched from LangSmith and then uploaded to Langfuse for
# tracing. Requires LANGSMITH_API_KEY (and optionally LANGSMITH_ENDPOINT)
# in the environment. Each example exposes:
#   - {{ inputs.<key> }}     — inputs dict
#   - {{ outputs.<key> }}    — outputs dict (may be None)
#   - metadata keys are spread at the top level
# dataset:
#   name: "MMLU Anatomy"
#   source:
#     provider: "langsmith"
#     dataset_name: "mmlu-anatomy"    # optional; defaults to `name` above
#   input: "{{ inputs.question }}"
#   expected_output: "{{ outputs.answer }}"

# --- Alternative: existing Arize Phoenix dataset -------------------------
# Fetched via the phoenix client; base_url / api_key fall back to
# PHOENIX_COLLECTOR_ENDPOINT and PHOENIX_CLIENT_HEADERS when omitted.
# Each example exposes:
#   - {{ input.<key> }}      — input dict
#   - {{ output.<key> }}     — output dict (may be None)
#   - metadata keys are spread at the top level
# dataset:
#   name: "MMLU Anatomy"
#   source:
#     provider: "phoenix"
#     dataset_name: "mmlu-anatomy"    # optional; defaults to `name` above
#     # version_id: "v1"              # optional; pin a dataset version
#     # base_url: "http://localhost:6006"
#     # api_key: "..."                # only for Phoenix Cloud
#   input: "{{ input.question }}"
#   expected_output: "{{ output.answer }}"

# --- Alternative: existing Opik (Comet) dataset --------------------------
# Opik dataset items are free-form dicts — reference whatever fields you
# stored directly (no wrapping `input`/`output` layer). Auth falls back to
# OPIK_URL_OVERRIDE / OPIK_API_KEY / OPIK_WORKSPACE when omitted.
# dataset:
#   name: "MMLU Anatomy"
#   source:
#     provider: "opik"
#     dataset_name: "mmlu-anatomy"    # optional; defaults to `name` above
#     # host: "https://www.comet.com/opik/api"
#     # api_key: "..."
#     # workspace: "my-workspace"
#     # project_name: "my-project"
#   input: "{{ question }}"            # however you stored it in Opik
#   expected_output: "{{ expected_output }}"

# --- Alternative: existing Braintrust dataset ----------------------------
# Braintrust records expose `input`, `expected`, `tags`, and `metadata`.
# Auth falls back to BRAINTRUST_API_KEY / BRAINTRUST_APP_URL env vars.
# dataset:
#   name: "MMLU Anatomy"
#   source:
#     provider: "braintrust"
#     project: "my-project"           # required; Braintrust project name
#     dataset_name: "mmlu-anatomy"    # optional; defaults to `name` above
#     # version: "1234"               # optional; pin to a dataset version
#     # api_key: "..."
#     # app_url: "https://www.braintrust.dev"
#     # org_name: "my-org"
#   input: "{{ input.question }}"     # if input was stored as a dict
#   expected_output: "{{ expected }}"

# --- Alternative: existing W&B Weave dataset -----------------------------
# Weave rows are free-form dicts — reference whatever fields you stored.
# Requires WANDB_API_KEY in the environment.
# dataset:
#   name: "MMLU Anatomy"
#   source:
#     provider: "weave"
#     project: "my-entity/my-project" # required; "<entity>/<project>"
#     dataset_name: "mmlu-anatomy"    # optional; defaults to `name` above
#     # version: "v3"                 # default "latest"; digest or version tag
#   input: "{{ question }}"           # however you stored it in Weave
#   expected_output: "{{ answer }}"

# --- Alternative: existing MLflow GenAI evaluation dataset ---------------
# Requires MLflow 3 with GenAI datasets (Databricks or self-hosted).
# Records expose `inputs`, `expectations`, and `tags` dicts.
# Auth falls back to MLFLOW_TRACKING_URI / MLFLOW_REGISTRY_URI env vars.
# dataset:
#   name: "MMLU Anatomy"
#   source:
#     provider: "mlflow"
#     dataset_name: "mmlu-anatomy"    # optional; defaults to `name` above
#     # dataset_id: "..."             # fetch by id instead of name
#     # tracking_uri: "databricks"
#     # registry_uri: "databricks-uc"
#   input: "{{ inputs.question }}"
#   expected_output: "{{ expectations.answer }}"


# -------------------------------------------------------------------------
# system_prompt  (required)
# -------------------------------------------------------------------------
# Applied to every experiment. Not used by evaluators (the evaluator
# uses the `system_prompt` / `system_prompt_no_reference` defined under
# `evaluation:` below).
system_prompt: |
  You are answering multiple-choice questions. Reply with a single letter: A, B, C, or D.


# -------------------------------------------------------------------------
# experiments  (required, list, min 1)
# -------------------------------------------------------------------------
# Each experiment runs the whole dataset once. Two modes are available
# and chosen automatically:
#   - SimpleCaller (no tools)    — experiment has no `mcp:` block
#   - AgentCaller  (tool loop)   — experiment has a non-empty `mcp:` list
#
# Both modes go through LangChain's ChatLiteLLM, so Langfuse callbacks and
# extra LiteLLM kwargs (reasoning_effort, parallel_tool_calls, seed,
# thinking, ...) work identically in both.
experiments:

  # ---------------- Minimal experiment -----------------------------------
  - name: "gpt-4o-mini"
    litellm:
      model: "gpt-4o-mini"            # required; LiteLLM model id
      temperature: 0.3                # any standard LiteLLM kwarg is supported
      max_tokens: 256
    # timeout_s: 60                   # optional per-row wall-clock timeout;
                                      # rows exceeding it fail with a timeout
                                      # error (and are re-raised under
                                      # `arena --fail-fast`)

  # ---------------- Local Ollama model -----------------------------------
  - name: "llama3.2-local"
    litellm:
      model: "ollama_chat/llama3.2:latest"
      api_base: "http://localhost:11434"
      temperature: 0.3
      max_tokens: 256

  # ---------------- Reasoning / thinking model ---------------------------
  # `reasoning_effort` tells LiteLLM the model emits reasoning separately;
  # values accepted by the provider include "low" / "medium" / "high" /
  # "disable". LiteLLM puts the reasoning in `reasoning_content` and keeps
  # `content` clean — no manual <think> parsing needed.
  # See https://docs.litellm.ai/docs/reasoning_content
  - name: "qwen3-thinking"
    litellm:
      model: "ollama_chat/qwen3:8b"
      api_base: "http://localhost:11434"
      reasoning_effort: "medium"
      max_tokens: 2048

  # ---------------- Agent with MCP tools ---------------------------------
  # Presence of a non-empty `mcp:` list switches this experiment to agent
  # mode: langgraph's create_react_agent wraps the model and runs the
  # tool-calling loop. Parallel function calling is supported natively
  # when the model emits multiple tool_calls per turn — enable via
  # `parallel_tool_calls: true` under `litellm:`.
  - name: "gpt-4o-with-tools"
    litellm:
      model: "gpt-4o"
      temperature: 0.2
      # parallel_tool_calls: true
    mcp:
      - name: "knowledge_base"        # free-form identifier
        url: "https://mcp.example.com/sse"    # SSE endpoint of the MCP server
      - name: "calculator"
        url: "https://calc.example.com/sse"


# -------------------------------------------------------------------------
# evaluation  (required)
# -------------------------------------------------------------------------
# One evaluator is run after all experiments complete. Three evaluators
# ship today:
#   - llm_as_judge    (pointwise) — scores each output independently
#                                   against expected_output (or without
#                                   reference if none was produced).
#                                   The judge returns a 1-5 rating, which
#                                   is normalised to a 0-1 Langfuse score.
#                                   Uses ChatLiteLLM.with_structured_output
#                                   for validated JSON.
#   - llm_as_verifier (group)     — round-robin pairwise verifier across
#                                   experiments. For each unordered pair
#                                   (A, B) the model emits
#                                   <score_A>X</score_A><score_B>Y</score_B>;
#                                   the reward at each tag is the expected
#                                   value under the model's top_logprobs
#                                   distribution over score letters. Each
#                                   pair is sampled K times and the
#                                   rewards are averaged (faithful to
#                                   Kwok et al. 2026 — pairs are not
#                                   position-swapped; variance reduction
#                                   comes from K and from criterion
#                                   decomposition). Optionally split
#                                   across C criteria (per-pair reward =
#                                   mean across criteria). Each model's
#                                   Langfuse score is the mean reward
#                                   over all pairs it appears in,
#                                   normalised to [0, 1].
#   - judge_panel     (pointwise) — rubric-driven panel. An inline
#                                   `scenario` block declares 0-10 rubric
#                                   bands per metric plus required_trace_fields.
#                                   Every panelist scores each metric in
#                                   parallel; when the per-metric spread
#                                   exceeds (1 - threshold) the metric is
#                                   escalated to a smarter model. See the
#                                   judge_panel block further down for a
#                                   ready-to-copy scenario.
evaluation:
  # "llm_as_judge" | "llm_as_verifier" | "judge_panel"
  method: "llm_as_judge"

  # LiteLLM config for the judge model. Same extras mechanism as
  # experiments (reasoning_effort, seed, thinking, ...).
  litellm:
    model: "gpt-4o-mini"
    temperature: 0.0
    # reasoning_effort: "medium"      # for reasoning-capable judges

  # Name written to Langfuse's Scores API. Appears as a column on each
  # trace and lets you sort/filter in the Langfuse UI.
  score_name: "quality_score"

  # Max concurrent judge calls. Tune for rate limits.
  max_concurrency: 5

  # Optional per-item wall-clock timeout for evaluator calls (seconds).
  # Items that exceed it receive score=None and an "evaluator timeout"
  # error instead of hanging a worker.
  # timeout_s: 60

  # --- Prompts (both required) -------------------------------------------
  # Both evaluator methods consume two prompts:
  #   system_prompt               — used when the row has a non-empty
  #                                 expected_output (reference mode).
  #   system_prompt_no_reference  — used when expected_output is empty
  #                                 (reference-free mode).
  #
  # The model receives a JSON object on the user turn; the exact fields
  # depend on the evaluator:
  #   llm_as_judge    → {"input", "output", "expected_output"?}
  #   llm_as_verifier → {"input", "output_A", "output_B", "expected_output"?}
  # llm_as_judge prompts MUST instruct the model to return JSON matching
  # the evaluator's schema (structured output is enforced via LangChain).
  # llm_as_verifier prompts MUST end with EXACTLY two score tags
  # (<score_A>X</score_A><score_B>Y</score_B>) and may use the
  # placeholders {granularity}, {score_letters}, {best_letter},
  # {worst_letter}, {criterion}, {criterion_description},
  # {scale_description}.
  #
  # The example below is for the `llm_as_judge` method selected above.
  # If you switch to `llm_as_verifier`, see the verifier prompts shown
  # at the bottom of this section.
  system_prompt: >
    You're an expert judge.
    Given a JSON object with the fields "input", "output" and "expected_output",
    rate how similar "output" is to "expected_output".
    Return ONLY a JSON object with the following format:

    {"thinking": "The output correctly identifies the main concept but misses two key details from the expected output.", "score": 4}

    "thinking" must come first: a short step-by-step reasoning explaining your assessment.
    "score" must be an integer from 1 to 5 (1 = completely wrong, 5 = perfect match).

  system_prompt_no_reference: >
    You're an expert judge. No ground truth is provided.
    Given a JSON object with the fields "input" and "output",
    judge the output's overall quality (correctness, relevance, clarity) as a response to the input.
    Return ONLY a JSON object with the following format:

    {"thinking": "The output is relevant but lacks depth and contains a minor inaccuracy.", "score": 3}

    "thinking" must come first: a short step-by-step reasoning explaining your assessment.
    "score" must be an integer from 1 to 5 (1 = poor, 5 = excellent).

  # --- llm_as_verifier prompts (drop in if you switch `method` above) ----
  #
  # system_prompt: |
  #   You are an expert evaluator. You will see a JSON object with the
  #   fields "input", "output_A", "output_B", and "expected_output". Your
  #   job is to evaluate the two outputs on ONE specific criterion:
  #   **{criterion}**.
  #
  #   Treat "expected_output" as the ground truth. Do NOT trust the outputs'
  #   self-assessment or claims of success — judge them against the ground
  #   truth on the criterion below.
  #
  #   **Evaluation Guideline — {criterion}:**
  #   {criterion_description}
  #
  #   Score each output ONLY on this specific criterion. Ignore other
  #   aspects of the outputs that are not relevant to "{criterion}".
  #
  #   **Rating Scale:**
  #   {scale_description}
  #
  #   You may reason briefly first. Then output your final scores in
  #   EXACTLY this format:
  #   <score_A>X</score_A>
  #   <score_B>Y</score_B>
  #   where X and Y are each one of: {score_letters}.
  #
  # system_prompt_no_reference: |
  #   You are an expert evaluator. You will see a JSON object with the
  #   fields "input", "output_A", and "output_B". No ground truth is
  #   provided. Your job is to evaluate the two outputs on ONE specific
  #   criterion: **{criterion}**.
  #
  #   Judge each output as a response to "input" on the criterion below.
  #
  #   **Evaluation Guideline — {criterion}:**
  #   {criterion_description}
  #
  #   Score each output ONLY on this specific criterion. Ignore other
  #   aspects of the outputs that are not relevant to "{criterion}".
  #
  #   **Rating Scale:**
  #   {scale_description}
  #
  #   You may reason briefly first. Then output your final scores in
  #   EXACTLY this format:
  #   <score_A>X</score_A>
  #   <score_B>Y</score_B>
  #   where X and Y are each one of: {score_letters}.

  # --- Verifier-only knobs (llm_as_verifier) -----------------------------
  # `granularity` (G): number of discrete score letters A..Z used to
  #                    extract a logprob distribution. Typical: 8.
  # `repeats`     (K): number of verifier samples averaged per
  #                    pair-criterion call. Typical: 1 (fast) to
  #                    16 (low-variance).
  # granularity: 8
  # repeats: 1

  # --- Criteria decomposition (llm_as_verifier) --------------------------
  # Per Kwok et al. 2026, a criterion is a {name, description} pair —
  # `name` labels the dimension and `description` is the long rubric the
  # verifier reads. Each criterion runs in its own pairwise call and the
  # per-pair reward is the mean across criteria. Per-row provider calls
  # = num_pairs * len(criteria) * repeats — watch rate limits and cost
  # when combining many criteria with high `repeats` or many
  # experiments. Omit `criteria` for a single holistic call (defaults:
  # name="correctness" with reference, "overall quality" without).
  #
  # criteria:
  #   - name: "Factual accuracy"
  #     description: >
  #       Compare the output to the expected output and judge whether
  #       the factual claims it makes (names, dates, numbers, causal
  #       relationships) are correct. Penalise hallucinated facts and
  #       contradictions with the ground truth, but do not penalise
  #       valid paraphrasing or additional correct context.
  #   - name: "Completeness"
  #     description: >
  #       Check whether the output covers every key point present in
  #       the expected output. A response that gets the gist right but
  #       omits required details should score lower than one that
  #       covers all of them, even if both are factually correct.
  #   - name: "Clarity"
  #     description: >
  #       Judge how clearly the output communicates its content:
  #       sentence structure, organisation, absence of jargon the
  #       reader would not understand. Ignore correctness here — only
  #       judge presentation.

  # -------------------------------------------------------------------------
  # Judge-panel evaluator (drop in if you switch `method` to "judge_panel")
  # -------------------------------------------------------------------------
  # `judge_panel` (pointwise) scores every output against an inline rubric
  # scenario (see the `scenario:` block below). Each rubric metric is scored
  # on a 0-10 scale by every panelist in parallel; the panel's spread is compared to
  # `(1 - metric.threshold)`. If at least two panelists agree within that
  # tolerance we return the mean (normalised to [0, 1]). When the panel
  # disagrees — or when fewer than two panelists survived — `smart_litellm`
  # re-scores that metric and its value wins. `smart_litellm` is mandatory:
  # every metric has a guaranteed escalation path.
  #
  # Unlike `llm_as_judge`/`llm_as_verifier`, this evaluator does NOT use
  # the top-level `litellm` / `system_prompt` / `system_prompt_no_reference`
  # fields (they stay on the schema for consistency; leave them as any
  # valid stub values). Prompts are built from the scenario's rubric.
  #
  # method: "judge_panel"
  # litellm:
  #   model: "unused"                  # required by schema; judge_panel ignores it
  # system_prompt: "unused"            # required by schema; judge_panel ignores it
  # system_prompt_no_reference: "unused"  # required by schema; judge_panel ignores it
  #
  # score_name: "date_range_compliance"
  # max_concurrency: 5
  # # timeout_s: 60
  #
  # # Inline scenario (rubric + required_trace_fields + threshold). Any
  # # required_trace_field other than `actual_output` is resolved from
  # # `ExecutionResult.metadata` on the dataset row — populate those upstream
  # # via Jinja2 templates or dataset metadata passthrough.
  # scenario:
  #   id: date-range-compliance
  #   name: Date range compliance
  #   description: >
  #     Checks whether the generated report respects the user-provided start
  #     and end date constraints for the research run.
  #   required_trace_fields:
  #     - start_date
  #     - end_date
  #     - actual_output
  #   scenario_metrics:
  #     - name: respects_date_range
  #       criteria: >
  #         Evaluate whether the report focuses on developments that fall
  #         within [start_date, end_date]. Penalize clearly out-of-range items.
  #       rubric:
  #         - score_range: [0, 2]
  #           expected_outcome: Substantially violates the requested window.
  #         - score_range: [3, 5]
  #           expected_outcome: At least one meaningful out-of-range item.
  #         - score_range: [6, 8]
  #           expected_outcome: Mostly respects the window, minor drift.
  #         - score_range: [9, 10]
  #           expected_outcome: Fully respects the requested window.
  #       threshold: 0.85
  #
  # # Panelists (≥ 2). Each config follows the same LiteLLM extras mechanism
  # # as experiments (reasoning_effort, seed, thinking, ...).
  # panelists:
  #   - model: "gpt-4o-mini"
  #     temperature: 0.0
  #   - model: "mistral-small-latest"
  #     temperature: 0.0
  #
  # # Smart judge used to resolve panel disagreement or insufficient survivors.
  # # Required when method is "judge_panel".
  # smart_litellm:
  #   model: "gpt-4o"
  #   temperature: 0.0
  #
  # # Structured-output retry budget (shared across panelists and smart).
  # max_retries: 3
