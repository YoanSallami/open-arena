[project]
name = "open-arena"
version = "0.1.0"
description = "Open Arena evaluation framework for general datasets using Langfuse, LiteLLM, and multi-metric analysis."
readme = "README.md"
requires-python = ">=3.12"
license = { file = "LICENSE.md" }
authors = [
    { name = "Atena Reply" }
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Intended Audience :: Developers",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Utilities",
    "Environment :: Console",
]
dependencies = [
    "fastapi",
    "fastapi-mcp",
    "fastmcp",
    "langchain",
    "langchain-core",
    "langchain-litellm",
    "langchain-mcp-adapters",
    "langfuse>=3.10.1",
    "langgraph>=0.6.6",
    "litellm>=1.80.15",
    "matplotlib",
    "networkx",
    "openai",
    "openpyxl",
    "opentelemetry-api",
    "opentelemetry-exporter-otlp",
    "opentelemetry-sdk",
    "pandas>=2.3.3",
    "playwright",
    "pydantic>=2",
    "python-dotenv",
    "pyyaml",
    "streamlit",
    "uvicorn",
    "xlsxwriter>=3.2.9",
]

[project.scripts]
arena = "src.main_cli:main"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]

[tool.setuptools.package-data]
"src" = ["*.yaml"]
